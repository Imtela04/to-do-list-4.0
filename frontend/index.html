<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>what-do</title>
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
<body>
  <style>
    /* Import your fonts immediately so the loader typography matches */
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

    /* Default (Light Mode) Variables */
    :root {
      --bg-primary: #f5f4ff;
      --accent-primary: rgb(124, 106, 255);
      --accent-secondary: #ff6a9e;
      --accent-tertiary: #00c9a7;
      --bg-card: #ffffff;
      --border-accent: rgba(124, 106, 255, 0.3);
      --bg-glass: rgba(0, 0, 0, 0.03);
      --border-subtle: rgba(0, 0, 0, 0.06);
      --text-primary: #1a1828;
      --text-muted: #9896b0;
      --font-mono: 'JetBrains Mono', monospace;
    }

    [data-theme="dark"] {
      --bg-primary: #0a0a0f;
      --accent-primary: #7c6aff;
      --accent-secondary: #ff6a9e;
      --accent-tertiary: #6affdc;
      --bg-card: #16161f;
      --border-accent: rgba(124, 106, 255, 0.4);
      --bg-glass: rgba(255, 255, 255, 0.04);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --text-primary: #f0eff8;
      --text-muted: #5a5875;
    }
    
    body {
      margin: 0;
      background-color: var(--bg-primary);
      -webkit-font-smoothing: antialiased;
    }

    /* Core Container */
    .initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-primary);
      z-index: 9999;
      overflow: hidden;
      font-family: var(--font-mono);
    }

    /* Background Blurs */
    .bg-decor {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: multiply;
      filter: blur(64px);
      opacity: 0.1;
    }
    .decor-1 {
      top: 25%; left: 25%; width: 16rem; height: 16rem;
      background-color: var(--accent-primary);
      animation: float 6s ease-in-out infinite;
    }
    .decor-2 {
      bottom: 25%; right: 25%; width: 18rem; height: 18rem;
      background-color: var(--accent-tertiary);
      animation: float 8s ease-in-out infinite reverse;
    }


    /* Text Formatting */
    .text-container { height: 4rem; text-align: center; display: flex; align-items: center; justify-content: center; z-index: 10; }
    .loading-text { font-size: 1.5rem; font-weight: bold; color: var(--text-primary); display: flex; align-items: center; letter-spacing: -0.025em; }
    .arrow { color: var(--accent-tertiary); margin-right: 0.5rem; }
    .cursor { width: 10px; height: 24px; background-color: var(--accent-primary); margin-left: 4px; display: inline-block; animation: cursorBlink 1s step-end infinite; }

    /* Progress bar */
    .progress-track { width: 16rem; height: 6px; background-color: var(--bg-glass); border-radius: 99px; overflow: hidden; position: relative; margin-top: 2rem; border: 1px solid var(--border-subtle); z-index: 10; }
    .progress-bar { position: absolute; top: 0; height: 100%; border-radius: 99px; background: linear-gradient(to right, var(--accent-secondary), var(--accent-primary), var(--accent-tertiary)); animation: progressSlide 2s ease-in-out infinite alternate; }
    .processing { margin-top: 0.75rem; font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }

    /* Animations */
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes spinReverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 15px var(--border-accent); } 50% { box-shadow: 0 0 25px var(--border-accent), inset 0 0 5px var(--border-accent); } }
    @keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes progressSlide { 0% { width: 10%; } 100% { width: 100%; } }
  </style>

  <div id="root">
    <div class="initial-loader">
      <div class="bg-decor decor-1"></div>
      <div class="bg-decor decor-2"></div>
      
      <div class="loader-rings">
        <div class="ring outer"></div>
        <div class="ring middle"></div>
        <div class="ring inner"></div>
        <div class="core-box"></div>
      </div>

      <div class="text-container">
        <div class="loading-text"><span class="arrow">&gt;</span> Booting systems <span class="cursor"></span></div>
      </div>

      <div class="progress-track"><div class="progress-bar"></div></div>
      <div class="processing">Processing Data</div>
    </div>
  </div>
  
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
